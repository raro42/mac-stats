name: Feature request
description: Idea for the monitor or optional AI agent
title: "[feat] "
labels: ["enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Menu bar / metrics UI
        - Themes / window UX
        - AI agent / Ollama / Discord
        - Packaging / Homebrew / notarization
        - Docs
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: Proposal
      description: Problem, proposed change, and why it helps.
    validations:
      required: true
