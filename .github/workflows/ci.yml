# CI — compile check (badge target for README)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Sync frontend into dist
        run: |
          chmod +x scripts/sync-dist.sh
          ./scripts/sync-dist.sh

      - name: cargo check
        working-directory: ./src-tauri
        run: cargo check --locked 2>/dev/null || cargo check
